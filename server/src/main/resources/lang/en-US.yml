# ==================== Help Messages ====================
help:
  header: "&e========== WooSocial Help ==========="
  footer: "&e====================================="
  
  # Main commands
  social: "&a/social &7- Open social menu"
  help: "&a/social help &7- View help"
  
  # Friend commands
  friend: "&a/friend &7- Open friends list"
  friend-add: "&a/friend add <player> &7- Add friend"
  friend-accept: "&a/friend accept [player] &7- Accept friend request"
  friend-deny: "&a/friend deny [player] &7- Deny friend request"
  friend-remove: "&a/friend remove <player> &7- Remove friend"
  friend-list: "&a/friend list [page] &7- View friends list"
  friend-notify: "&a/friend notify <player> [on/off] &7- Set online notification"
  friend-requests: "&a/friend requests &7- View friend requests"
  friend-block: "&a/friend block <player> &7- Block player"
  friend-unblock: "&a/friend unblock <player> &7- Unblock player"
  friend-blocked: "&a/friend blocked [page] &7- View blocked list"
  
  # Teleport commands
  tpf: "&a/tpf <player> &7- Teleport to friend"
  tpftoggle: "&a/tpftoggle &7- Toggle friend teleport permission"
  tpfallow: "&a/tpfallow [player] &7- Allow friend to teleport"
  tpfdeny: "&a/tpfdeny [player] &7- Deny friend to teleport"

