name: WooSocial
version: ${project.version}
main: com.oolonghoo.woosocial.WooSocial
api-version: '1.21'
author: oolongho
description: A simple Minecraft social plugin.

softdepend:
  - PlaceholderAPI
  - Vault
  - PlayerPoints

commands:
  social:
    description: Open social menu
    usage: /social
    permission: woosocial.use
  friend:
    description: Friend system commands
    usage: /friend [args]
    permission: woosocial.friend.use
  tpf:
    description: Teleport to friend
    usage: /tpf <player>
    permission: woosocial.teleport.use
  tpftoggle:
    description: Toggle teleport permission (global or for specific player)
    usage: /tpftoggle [player]
    permission: woosocial.teleport.toggle
  mail:
    description: Mail system commands
    usage: /mail [send|list|claim|delete|bulk]
    permission: woosocial.mail
  relation:
    description: Relation system commands
    usage: /relation [list|propose|accept|remove|info|types]
    permission: woosocial.relation
  gift:
    description: Gift system commands
    usage: /gift [coins|send|shop|list]
    permission: woosocial.gift

permissions:
  woosocial.use:
    description: Basic usage permission
    default: true
  woosocial.admin:
    description: Admin permission
    default: op
  woosocial.reload:
    description: Reload config permission
    default: op
  woosocial.help:
    description: View help permission
    default: true
  
  # Friend permissions
  woosocial.friend:
    description: Friend base permission
    default: true
  woosocial.friend.list:
    description: View friend list
    default: true
  woosocial.friend.add:
    description: Add friend
    default: true
  woosocial.friend.accept:
    description: Accept friend request
    default: true
  woosocial.friend.deny:
    description: Deny friend request
    default: true
  woosocial.friend.remove:
    description: Remove friend
    default: true
  woosocial.friend.requests:
    description: View friend requests
    default: true
  woosocial.friend.notify:
    description: Set online notification
    default: true
  woosocial.friend.limit.bypass:
    description: Bypass friend limit
    default: op
  
  # Block permissions
  woosocial.block:
    description: Block base permission
    default: true
  woosocial.block.add:
    description: Block player
    default: true
  woosocial.block.remove:
    description: Unblock player
    default: true
  woosocial.block.list:
    description: View blocked list
    default: true
  
  # Teleport permissions
  woosocial.teleport:
    description: Teleport base permission
    default: true
  woosocial.teleport.to:
    description: Teleport to friend
    default: true
  woosocial.teleport.toggle:
    description: Toggle teleport permission
    default: true
  woosocial.teleport.cooldown.bypass:
    description: Bypass teleport cooldown
    default: op
  woosocial.teleport.countdown.bypass:
    description: Bypass teleport countdown
    default: op
  
  # GUI permissions
  woosocial.gui:
    description: Open social menu
    default: true
  
  # Mail permissions
  woosocial.mail:
    description: Mail base permission
    default: true
  woosocial.mail.send:
    description: Send mail
    default: true
  woosocial.mail.claim:
    description: Claim mail
    default: true
  woosocial.mail.delete:
    description: Delete mail
    default: true
  woosocial.mail.bulk:
    description: Bulk send mail
    default: op
  woosocial.mail.admin:
    description: Mail admin permission
    default: op
  woosocial.mail.sendall:
    description: Send system mail to all players
    default: op
  woosocial.mail.sendonline:
    description: Send system mail to online players
    default: op
  
  # Relation permissions
  woosocial.relation:
    description: Relation base permission
    default: true
  woosocial.relation.set:
    description: Set relation
    default: true
  woosocial.relation.remove:
    description: Remove relation
    default: true
  woosocial.relation.propose:
    description: Propose relation
    default: true
  woosocial.relation.accept:
    description: Accept relation proposal
    default: true
  
  # Gift permissions
  woosocial.gift:
    description: Gift base permission
    default: true
  woosocial.gift.coins:
    description: Gift coins
    default: true
  woosocial.gift.shop:
    description: Use gift shop
    default: true
  woosocial.gift.unlimited:
    description: Unlimited gifting
    default: op
  woosocial.gui.friend:
    description: Open friend GUI
    default: true
