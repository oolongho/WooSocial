# WooSocial Configuration

# ... and more...

# Mail System Configuration
mail:
  enabled: true
  # Max items per send
  max-send-count: 10
  # Mail expire time (days)
  expire-days: 30
  # Max mails per player
  max-mails-per-player: 100
  # Max item data size (bytes)
  max-item-size: 32000
  # Notify on receive
  notify-on-receive: true
  # Bulk mail configuration
  bulk:
    enabled: true
    permission: "woosocial.mail.bulk"

# Relation System Configuration
relation:
  enabled: true
  # Daily free coins to gift
  daily-free-coins: 100
  # Daily gift friends limit
  daily-gift-friends: 5
  # Intimacy gained per coin
  coins-intimacy-per-unit: 1
  # Max intimacy
  max-intimacy: 10000

# Economy Integration
economy:
  enabled: true
  provider: "Vault"

# PlayerPoints Integration (optional)
playerpoints:
  enabled: false
  provider: "PlayerPoints"
