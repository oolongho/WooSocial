# WooSocial Main Configuration
# WooSocial 主配置文件

# Settings
# 设置
settings:
  # Debug mode
  # 调试模式
  debug: false
  # Language file
  # 语言文件
  language: "zh-CN"
  # Server name for cross-server sync
  # 跨服同步使用的服务器名称
  server-name: "server1"
  # Auto save interval in seconds
  # 自动保存间隔（秒）
  auto-save-interval: 300

# Database Configuration
# 数据库配置
database:
  # Database type: sqlite or mysql
  # 数据库类型：sqlite 或 mysql
  type: sqlite
  
  # MySQL Configuration (only used when type is mysql)
  # MySQL 配置 (仅当 type 为 mysql 时使用)
  mysql:
    host: localhost
    port: 3306
    database: minecraft
    user: root
    password: ""
    table-prefix: "woosocial_"
  
  # SQLite Configuration (only used when type is sqlite)
  # SQLite 配置 (仅当 type 为 sqlite 时使用)
  sqlite:
    file: "data.db"
  
  # Connection Pool Configuration (HikariCP)
  # 连接池配置 (HikariCP)
  pool:
    # Maximum number of connections in the pool
    # 连接池最大连接数
    maximum-pool-size: 10
    # Minimum number of idle connections
    # 最小空闲连接数
    minimum-idle: 2
    # Connection timeout in milliseconds (30 seconds)
    # 连接超时时间（毫秒）
    connection-timeout: 30000
    # Idle connection timeout in milliseconds (10 minutes)
    # 空闲连接超时时间（毫秒）
    idle-timeout: 600000
    # Maximum lifetime of a connection in milliseconds (30 minutes)
    # 连接最大生命周期（毫秒）
    max-lifetime: 1800000

# Economy Integration
# 经济系统集成
economy:
  enabled: true
  provider: "Vault"

# PlayerPoints Integration (optional)
# PlayerPoints 积分系统集成（可选）
playerpoints:
  enabled: true
  provider: "PlayerPoints"

# Cache Configuration
# 缓存配置
cache:
  # Maximum number of mail entries to cache
  # 邮件缓存最大条目数
  mail-max-size: 1000
  # Maximum number of relation entries to cache
  # 关系缓存最大条目数
  relation-max-size: 500
  # Whether to warmup cache on plugin enable
  # 是否在插件启用时预热缓存
  # Preloads data for online players when plugin starts
  # 预加载在线玩家的数据
  warmup-on-enable: true

# Cross-Server Sync Configuration
# 跨服同步配置
cross-server:
  # Enable cross-server sync
  # 启用跨服同步
  enabled: false
  # Sync mode: bungee, velocity, redis, mysql
  # 同步模式：bungee, velocity, redis, mysql
  mode: "bungee"
  
  # Redis Configuration (only used when mode is redis)
  # Redis 配置（仅当 mode 为 redis 时使用）
  redis:
    enabled: false
    # Redis connection URI
    # Redis 连接 URI
    uri: "redis://localhost:6379"
    # Redis password (leave empty if no password)
    # Redis 密码（无密码则留空）
    password: ""
  
  # MySQL Polling Configuration (only used when mode is mysql)
  # MySQL 轮询配置（仅当 mode 为 mysql 时使用）
  mysql-poll:
    # Poll interval in seconds
    # 轮询间隔（秒）
    interval: 5
