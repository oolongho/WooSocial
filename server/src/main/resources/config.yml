# WooSocial Configuration

# Database Configuration
# 数据库配置
database:
  # Database type: sqlite or mysql
  # 数据库类型: sqlite 或 mysql
  type: sqlite
  
  # MySQL Configuration (only used when type is mysql)
  # MySQL 配置 (仅当 type 为 mysql 时使用)
  mysql:
    host: localhost
    port: 3306
    database: minecraft
    user: root
    password: ""
    table-prefix: "woosocial_"
  
  # SQLite Configuration (only used when type is sqlite)
  # SQLite 配置 (仅当 type 为 sqlite 时使用)
  sqlite:
    file: "data.db"
  
  # Connection Pool Configuration (HikariCP)
  # 连接池配置 (HikariCP)
  pool:
    # Maximum number of connections in the pool
    # 连接池最大连接数
    maximum-pool-size: 10
    # Minimum number of idle connections
    # 最小空闲连接数
    minimum-idle: 2
    # Connection timeout in milliseconds (30 seconds)
    # 连接超时时间（毫秒）
    connection-timeout: 30000
    # Idle connection timeout in milliseconds (10 minutes)
    # 空闲连接超时时间（毫秒）
    idle-timeout: 600000
    # Maximum lifetime of a connection in milliseconds (30 minutes)
    # 连接最大生命周期（毫秒）
    max-lifetime: 1800000

# Mail System Configuration
mail:
  enabled: true
  # Max items per send
  max-send-count: 10
  # Mail expire time (days)
  expire-days: 30
  # Max mails per player
  max-mails-per-player: 100
  # Max item data size (bytes)
  max-item-size: 32000
  # Notify on receive
  notify-on-receive: true
  # Handling method when inventory space is insufficient
  # deny - Reject claim, mail is preserved
  # drop - Add to inventory and drop excess items
  claim-space-insufficient: deny
  # Bulk mail configuration
  bulk:
    enabled: true
    permission: "woosocial.mail.bulk"

# Friend System Configuration
friend:
  enabled: true
  # Maximum number of friends a player can have
  # 玩家最大好友数量
  max-friends: 100
  # Maximum number of pending friend requests
  # 最大待处理好友请求数量
  max-pending-requests: 50

# Relation System Configuration
relation:
  enabled: true
  # Daily free coins to gift
  daily-free-coins: 100
  # Daily gift friends limit
  daily-gift-friends: 5
  # Intimacy gained per coin
  coins-intimacy-per-unit: 1
  # Max intimacy
  max-intimacy: 10000

# Economy Integration
economy:
  enabled: true
  provider: "Vault"

# PlayerPoints Integration (optional)
playerpoints:
  enabled: true
  provider: "PlayerPoints"

# Cache Configuration
# 缓存配置
cache:
  # Maximum number of mail entries to cache
  # 邮件缓存最大条目数
  mail-max-size: 1000
  # Maximum number of relation entries to cache
  # 关系缓存最大条目数
  relation-max-size: 500
  # Whether to warmup cache on plugin enable
  # Preloads data for online players when plugin starts
  # 是否在插件启用时预热缓存
  # 预加载在线玩家的数据
  warmup-on-enable: true
