# WooSocial Module Configuration

modules:
  friend:
    enabled: true
  
  teleport:
    enabled: true
  
  block:
    enabled: true
  
  mail:
    enabled: true
  
  relation:
    enabled: true

# 模块依赖说明：
# - friend 模块: 好友系统核心功能
# - teleport 模块依赖 friend 模块（只能传送给好友）
# - block 模块独立运行，但会影响 friend 模块的行为
# - mail 模块独立运行，提供物品邮件功能
# - relation 模块依赖 friend 模块，提供好友关系类型和亲密度功能