﻿﻿﻿﻿﻿﻿﻿﻿﻿title: "<black>收到的礼物"

layout:
  - '#1######'
  - '#ggggggg#'
  - '#ggggggg#'
  - '#ggggggg#'
  - '#ggggggg#'
  - '#<#####>#'

icons:
  '#':
    material: LIME_STAINED_GLASS_PANE
    name: ""
  
  '1':
    material: BOOK
    name: "<yellow>返回"
    lore:
      - "<gray>返回关系列表"
    actions:
      left: "[close, sound:entity_mule_chest]"
  
  'g':
    material: PLAYER_HEAD
    skull_owner: "{sender_name}"
    name: "<gold>{gift_name}"
    lore:
      - "<gray>来自: <white>{sender_name}"
      - "<gray>时间: <white>{send_time}"
      - "<gray>亲密度: <yellow>+{intimacy}"
  
  '<':
    material: ARROW
    name: "<yellow>上一页"
    lore:
      - "<gray>当前: <white>{page}/{total_pages}"
    actions:
      left: "[prev_page, sound:entity_mule_chest]"
  
  '>':
    material: ARROW
    name: "<yellow>下一页"
    lore:
      - "<gray>当前: <white>{page}/{total_pages}"
    actions:
      left: "[next_page, sound:entity_mule_chest]"
