title: "<black>与 {friend_name} 的礼物记录"

layout:
  - '#########'
  - '####i####'
  - '#ggggggg#'
  - '#ggggggg#'
  - '#ggggggg#'
  - '#<#####>#'

icons:
  '#':
    material: LIME_STAINED_GLASS_PANE
    name: ""
  
  'i':
    material: PLAYER_HEAD
    skull_owner: "{friend_name}"
    name: "<yellow>{friend_name}"
    lore:
      - "<gray>查看你们之间的礼物记录"
  
  'g':
    material: PLAYER_HEAD
    skull_owner: "{sender_name}"
    name: "<gold>{gift_name}"
    lore:
      - "<gray>发送者: <white>{sender_name}"
      - "<gray>时间: <white>{send_time}"
      - "<gray>亲密度: <yellow>+{intimacy}"
  
  '<':
    material: ARROW
    name: "<yellow>上一页"
    lore:
      - "<gray>当前: <white>{page}/{total_pages}"
    actions:
      left: "[prev_page, sound:entity_mule_chest]"
  
  '>':
    material: ARROW
    name: "<yellow>下一页"
    lore:
      - "<gray>当前: <white>{page}/{total_pages}"
    actions:
      left: "[next_page, sound:entity_mule_chest]"
