﻿﻿﻿﻿﻿﻿﻿﻿﻿title: "<black>好友列表 <gray>{page}/{total_pages}"

layout:
  - '#1######'
  - '#1111111#'
  - '#1111111#'
  - '#1111111#'
  - '#########'
  - '#<#####>#'

icons:
  '#':
    material: LIME_STAINED_GLASS_PANE
    name: ""
  
  '1':
    material: PLAYER_HEAD
    skull_owner: "{friend_name}"
    name: "{is_online ? <green> : <gray>}{friend_name}"
    lore:
      - "<gray>状态: {is_online ? <green>在线 : <red>离线}"
      - ""
      - "<gray>好友时间: <yellow>{friend_since}"
      - ""
      - "<aqua>左键 <gray>查看详情"
      - "{is_online ? <green>右键 <gray>传送到好友 : ''}"
    actions:
      left: "[open_gui:friend_detail, sound:entity_mule_chest]"
      right: "{is_online ? teleport_to_friend : ''}"
  
  '<':
    material: SPECTRAL_ARROW
    name: "<yellow>上一页"
    lore:
      - "<gray>点击翻页"
    actions:
      left: "[prev_page, sound:entity_mule_chest]"
  
  '>':
    material: SPECTRAL_ARROW
    name: "<yellow>下一页"
    lore:
      - "<gray>点击翻页"
    actions:
      left: "[next_page, sound:entity_mule_chest]"
