title: "<black>屏蔽列表 <gray>{page}/{total_pages}"

layout:
  - '#1######'
  - '#1111111#'
  - '#1111111#'
  - '#1111111#'
  - '#########'
  - '#<#####>#'

icons:
  '#':
    material: LIME_STAINED_GLASS_PANE
    name: ""
  
  '1':
    material: PLAYER_HEAD
    skull_owner: "{blocked_name}"
    name: "<red>{blocked_name}"
    lore:
      - "<gray>状态: <red>已屏蔽"
      - ""
      - "<green>点击取消屏蔽"
    actions:
      left: "[unblock_player, sound:entity_mule_chest]"
  
  '<':
    material: SPECTRAL_ARROW
    name: "<yellow>上一页"
    lore:
      - "<gray>点击翻页"
    actions:
      left: "[prev_page, sound:entity_mule_chest]"
  
  '>':
    material: SPECTRAL_ARROW
    name: "<yellow>下一页"
    lore:
      - "<gray>点击翻页"
    actions:
      left: "[next_page, sound:entity_mule_chest]"
