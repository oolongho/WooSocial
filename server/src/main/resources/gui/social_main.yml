title: "<dark_gray>社交菜单"

layout:
  - '#1######'
  - '#234567#'
  - '#########'
  - '#########'
  - '#########'
  - '#########'

icons:
  '#':
    material: LIME_STAINED_GLASS_PANE
    name: ""
  
  '1':
    material: PLAYER_HEAD
    skull_owner: "{player_name}"
    name: "<green>好友列表"
    lore:
      - "<gray>查看你的好友列表"
      - ""
      - "<gray>好友数量: <yellow>{friend_count}"
    actions:
      left: [open_gui:friend_list, sound:entity_mule_chest]
  
  '2':
    material: GOLDEN_APPLE
    name: "<gold>好友请求"
    lore:
      - "<gray>处理待处理的好友请求"
      - ""
      - "<gray>待处理: <yellow>{request_count}"
    actions:
      left: [open_gui:friend_requests, sound:entity_mule_chest]
  
  '3':
    material: CRAFTING_TABLE
    name: "<aqua>社交设置"
    lore:
      - "<gray>管理社交相关设置"
    actions:
      left: [open_gui:social_settings, sound:entity_mule_chest]
  
  '4':
    material: BARRIER
    name: "<red>屏蔽列表"
    lore:
      - "<gray>查看已屏蔽的玩家"
      - ""
      - "<gray>已屏蔽: <yellow>{blocked_count}"
    actions:
      left: [open_gui:blocked_list, sound:entity_mule_chest]
  
  '5':
    material: BOOK
    name: "<yellow>帮助"
    lore:
      - "<gray>插件使用帮助"
      - ""
      - "<gray>/friend add <玩家> - 添加好友"
      - "<gray>/friend remove <玩家> - 删除好友"
      - "<gray>/tpf <好友> - 传送到好友"
      - "<gray>/tpftoggle - 切换传送权限"
    actions:
      left: [sound:entity_mule_chest]
  
  '6':
    material: NAME_TAG
    name: "<white>个人信息"
    lore:
      - "<gray>查看你的社交信息"
      - ""
      - "<gray>好友数量: <yellow>{friend_count}"
      - "<gray>屏蔽数量: <yellow>{blocked_count}"
    actions:
      left: [sound:entity_mule_chest]
  
  '7':
    material: COMPASS
    name: "<blue>快速操作"
    lore:
      - "<gray>常用快捷操作"
    actions:
      left: [sound:entity_mule_chest]
