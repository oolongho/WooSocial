# Friend module configuration
# 好友模块配置文件

# Basic settings
# 基础设置
max-friends: 50
request-expire-time: 300
default-notify-online: true

# Notification settings
# 通知设置
notifications:
  # Show friend online message
  # 显示好友上线消息
  show-online: true
  # Show friend offline message
  # 显示好友下线消息
  show-offline: false
  # Sound when friend comes online
  # 好友上线时播放的声音
  online-sound: ENTITY_EXPERIENCE_ORB_PICKUP
  # Sound when receiving friend request
  # 收到好友请求时播放的声音
  request-sound: BLOCK_NOTE_BLOCK_PLING
