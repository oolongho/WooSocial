# Trade module configuration
# 交易模块配置文件

# Basic settings
# 基础设置
request-expire-time: 60
countdown-seconds: 3
face-to-face-distance: 50

# Permission settings
# 权限设置
require-permission: false

# Security settings
# 安全设置
security:
  cancel-on-damage: true
  cancel-on-move: false
  move-threshold: 1.5
  revoke-ready-on-change: true

# Item blacklist
# 物品黑名单
blacklist:
  enabled: true
  items:
    - "BEDROCK"
    - "BARRIER"
    - "COMMAND_BLOCK"
    - "STRUCTURE_BLOCK"
    - "STRUCTURE_VOID"

# Economy settings
# 经济设置
economy:
  vault:
    enabled: true
  playerpoints:
    enabled: true

# Logging settings
# 日志设置
logging:
  enabled: true
  retention-days: 30

# Sounds
# 音效
sounds:
  request-send: "ENTITY_EXPERIENCE_ORB_PICKUP"
  request-receive: "BLOCK_NOTE_BLOCK_PLING"
  trade-start: "ENTITY_PLAYER_LEVELUP"
  trade-complete: "ENTITY_PLAYER_LEVELUP"
  trade-cancel: "ENTITY_ITEM_BREAK"
  countdown-tick: "BLOCK_NOTE_BLOCK_PLING"
  blocked-item: "ENTITY_ITEM_BREAK"

# GUI settings
# GUI 设置
gui:
  title: "&8交易 - &e{player}"
  size: 54
  layout:
    my-items: [0,1,2,3,4,9,10,11,12,13,18,19,20,21,22,27,28,29,30,31]
    other-items: [5,6,7,8,14,15,16,17,23,24,25,26,32,33,34,35,36,37,38,39]
    ready-button: 47
    cancel-button: 49
    money-button: 45
  
  items:
    ready-button:
      material: LIME_DYE
      name: "&a确认交易"
      lore:
        - "&7点击确认交易"
    cancel-button:
      material: RED_DYE
      name: "&c取消交易"
      lore:
        - "&7点击取消交易"
    money-button:
      material: GOLD_INGOT
      name: "&e放入金币"
      lore:
        - "&7点击输入金币数量"
    decoration:
      material: GRAY_STAINED_GLASS_PANE
      name: " "
      slots: [46, 48, 50, 51, 52, 53]
