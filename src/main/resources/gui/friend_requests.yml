title: "<dark_gray>好友请求 <gray>{page}/{total_pages}"

layout:
  - '#1######'
  - '#1111111#'
  - '#1111111#'
  - '#1111111#'
  - '#########'
  - '#<#####>#'

icons:
  '#':
    material: LIME_STAINED_GLASS_PANE
    name: ""
  
  '1':
    material: PLAYER_HEAD
    skull_owner: "{sender_name}"
    name: "<gold>{sender_name}"
    lore:
      - "<gray>发送时间: <yellow>{send_time}"
      - "<gray>剩余时间: <yellow>{remaining_time}"
      - ""
      - "<green>左键 <gray>接受请求"
      - "<red>右键 <gray>拒绝请求"
    actions:
      left: [accept_friend_request, sound:entity_mule_chest]
      right: [deny_friend_request, sound:entity_mule_chest]
  
  '<':
    material: SPECTRAL_ARROW
    name: "<yellow>上一页"
    lore:
      - "<gray>点击翻页"
    actions:
      left: [prev_page, sound:entity_mule_chest]
  
  '>':
    material: SPECTRAL_ARROW
    name: "<yellow>下一页"
    lore:
      - "<gray>点击翻页"
    actions:
      left: [next_page, sound:entity_mule_chest]
